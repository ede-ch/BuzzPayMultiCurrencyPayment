openapi: 3.0.3
info:
  title: 'Buzzvel Multi-Currency Payment API'
  description: 'REST API for submitting, reviewing and approving multi-currency payment requests across employees in different countries.'
  version: 1.0.0
servers:
  -
    url: 'http://localhost'
tags:
  -
    name: Authentication
    description: "\nEndpoints for registering, authenticating and logging out users via\nLaravel Sanctum personal access tokens."
  -
    name: 'Payment Requests'
    description: "\nManage multi-currency payment requests. All endpoints in this group\nrequire a valid Sanctum bearer token (`Authorization: Bearer {token}`).\nEmployees can create requests and view their own; finance users can\nview all requests and approve or reject pending ones."
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'You can obtain a token via the <b>Register</b> or <b>Login</b> endpoints below, then use it as a Bearer token in the Authorization header.'
security:
  -
    default: []
paths:
  /api/auth/register:
    post:
      summary: Register
      operationId: register
      description: "Creates a new user account and returns a Sanctum bearer token that\ncan be used to authenticate subsequent requests. New accounts default\nto the `employee` role."
      parameters: []
      responses:
        201:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  user:
                    id: 1
                    name: 'Alice Ferreira'
                    email: alice@example.com
                    role: employee
                    country: Brazil
                    currency_code: BRL
                  access_token: 1|abcdef1234567890
                  token_type: Bearer
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: 'Alice Ferreira'
                      email:
                        type: string
                        example: alice@example.com
                      role:
                        type: string
                        example: employee
                      country:
                        type: string
                        example: Brazil
                      currency_code:
                        type: string
                        example: BRL
                  access_token:
                    type: string
                    example: 1|abcdef1234567890
                  token_type:
                    type: string
                    example: Bearer
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'The email has already been taken.'
                  errors:
                    email:
                      - 'The email has already been taken.'
                properties:
                  message:
                    type: string
                    example: 'The email has already been taken.'
                  errors:
                    type: object
                    properties:
                      email:
                        type: array
                        example:
                          - 'The email has already been taken.'
                        items:
                          type: string
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: "The user's full name."
                  example: 'Alice Ferreira'
                email:
                  type: string
                  description: 'A unique, valid email address.'
                  example: alice@example.com
                password:
                  type: string
                  description: 'Minimum 8 characters.'
                  example: password123
                country:
                  type: string
                  description: "The user's country."
                  example: Brazil
                currency_code:
                  type: string
                  description: 'ISO 4217 3-letter currency code (stored uppercased).'
                  example: BRL
                password_confirmation:
                  type: string
                  description: 'Must match the password field.'
                  example: password123
              required:
                - name
                - email
                - password
                - country
                - currency_code
                - password_confirmation
      security: []
  /api/auth/login:
    post:
      summary: Login
      operationId: login
      description: "Authenticates a user with email and password and returns a new\nSanctum bearer token."
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  user:
                    id: 1
                    name: 'Alice Ferreira'
                    email: alice@example.com
                    role: employee
                    country: Brazil
                    currency_code: BRL
                  access_token: 2|fedcba0987654321
                  token_type: Bearer
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: 'Alice Ferreira'
                      email:
                        type: string
                        example: alice@example.com
                      role:
                        type: string
                        example: employee
                      country:
                        type: string
                        example: Brazil
                      currency_code:
                        type: string
                        example: BRL
                  access_token:
                    type: string
                    example: 2|fedcba0987654321
                  token_type:
                    type: string
                    example: Bearer
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'The provided credentials are incorrect.'
                properties:
                  message:
                    type: string
                    example: 'The provided credentials are incorrect.'
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: "The user's email address."
                  example: alice@example.com
                password:
                  type: string
                  description: "The user's password."
                  example: password123
              required:
                - email
                - password
      security: []
  /api/auth/logout:
    post:
      summary: Logout
      operationId: logout
      description: 'Revokes the bearer token used to authenticate the current request.'
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Logged out successfully.'
                properties:
                  message:
                    type: string
                    example: 'Logged out successfully.'
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Authentication
  /api/payment-requests:
    get:
      summary: 'List payment requests'
      operationId: listPaymentRequests
      description: "Returns a paginated list of payment requests. Employees see only\ntheir own requests; finance users see requests from everyone."
      parameters:
        -
          in: query
          name: status
          description: 'Filter by status. One of `pending`, `approved`, `rejected`, `expired`.'
          example: pending
          required: false
          schema:
            type: string
            description: 'Filter by status. One of `pending`, `approved`, `rejected`, `expired`.'
            example: pending
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    -
                      id: 1
                      status: pending
                      amount_local: '550.00'
                      currency_code: BRL
                      amount_eur: '100.00'
                      exchange_rate: '5.500000'
                      rate_source: exchangerate-api.com
                      rate_fetched_at: '2026-06-12T12:00:00.000000Z'
                      description: 'Office supplies'
                      expires_at: '2026-06-14T12:00:00.000000Z'
                      created_at: '2026-06-12T12:00:00.000000Z'
                      user:
                        id: 1
                        name: 'Alice Ferreira'
                      reviewer: null
                  links:
                    first: 'http://localhost/api/payment-requests?page=1'
                    last: 'http://localhost/api/payment-requests?page=1'
                    prev: null
                    next: null
                  meta:
                    current_page: 1
                    from: 1
                    last_page: 1
                    per_page: 15
                    to: 1
                    total: 1
                properties:
                  data:
                    type: array
                    example:
                      -
                        id: 1
                        status: pending
                        amount_local: '550.00'
                        currency_code: BRL
                        amount_eur: '100.00'
                        exchange_rate: '5.500000'
                        rate_source: exchangerate-api.com
                        rate_fetched_at: '2026-06-12T12:00:00.000000Z'
                        description: 'Office supplies'
                        expires_at: '2026-06-14T12:00:00.000000Z'
                        created_at: '2026-06-12T12:00:00.000000Z'
                        user:
                          id: 1
                          name: 'Alice Ferreira'
                        reviewer: null
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        status:
                          type: string
                          example: pending
                        amount_local:
                          type: string
                          example: '550.00'
                        currency_code:
                          type: string
                          example: BRL
                        amount_eur:
                          type: string
                          example: '100.00'
                        exchange_rate:
                          type: string
                          example: '5.500000'
                        rate_source:
                          type: string
                          example: exchangerate-api.com
                        rate_fetched_at:
                          type: string
                          example: '2026-06-12T12:00:00.000000Z'
                        description:
                          type: string
                          example: 'Office supplies'
                        expires_at:
                          type: string
                          example: '2026-06-14T12:00:00.000000Z'
                        created_at:
                          type: string
                          example: '2026-06-12T12:00:00.000000Z'
                        user:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 1
                            name:
                              type: string
                              example: 'Alice Ferreira'
                        reviewer:
                          type: string
                          example: null
                          nullable: true
                  links:
                    type: object
                    properties:
                      first:
                        type: string
                        example: 'http://localhost/api/payment-requests?page=1'
                      last:
                        type: string
                        example: 'http://localhost/api/payment-requests?page=1'
                      prev:
                        type: string
                        example: null
                        nullable: true
                      next:
                        type: string
                        example: null
                        nullable: true
                  meta:
                    type: object
                    properties:
                      current_page:
                        type: integer
                        example: 1
                      from:
                        type: integer
                        example: 1
                      last_page:
                        type: integer
                        example: 1
                      per_page:
                        type: integer
                        example: 15
                      to:
                        type: integer
                        example: 1
                      total:
                        type: integer
                        example: 1
      tags:
        - 'Payment Requests'
    post:
      summary: 'Create a payment request'
      operationId: createAPaymentRequest
      description: "Submits a new payment request in the authenticated user's local\ncurrency. The EUR exchange rate is fetched (and cached) at creation\ntime and stored alongside the request — it never changes afterwards.\nThe request is created with `status: pending` and `expires_at` set to\n48 hours from now."
      parameters: []
      responses:
        201:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    id: 1
                    status: pending
                    amount_local: '550.00'
                    currency_code: BRL
                    amount_eur: '100.00'
                    exchange_rate: '5.500000'
                    rate_source: exchangerate-api.com
                    rate_fetched_at: '2026-06-12T12:00:00.000000Z'
                    description: 'Office supplies'
                    expires_at: '2026-06-14T12:00:00.000000Z'
                    created_at: '2026-06-12T12:00:00.000000Z'
                    user:
                      id: 1
                      name: 'Alice Ferreira'
                    reviewer: null
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      status:
                        type: string
                        example: pending
                      amount_local:
                        type: string
                        example: '550.00'
                      currency_code:
                        type: string
                        example: BRL
                      amount_eur:
                        type: string
                        example: '100.00'
                      exchange_rate:
                        type: string
                        example: '5.500000'
                      rate_source:
                        type: string
                        example: exchangerate-api.com
                      rate_fetched_at:
                        type: string
                        example: '2026-06-12T12:00:00.000000Z'
                      description:
                        type: string
                        example: 'Office supplies'
                      expires_at:
                        type: string
                        example: '2026-06-14T12:00:00.000000Z'
                      created_at:
                        type: string
                        example: '2026-06-12T12:00:00.000000Z'
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          name:
                            type: string
                            example: 'Alice Ferreira'
                      reviewer:
                        type: string
                        example: null
                        nullable: true
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'The currency code field is invalid.'
                  errors:
                    currency_code:
                      - 'The selected currency code is invalid.'
                properties:
                  message:
                    type: string
                    example: 'The currency code field is invalid.'
                  errors:
                    type: object
                    properties:
                      currency_code:
                        type: array
                        example:
                          - 'The selected currency code is invalid.'
                        items:
                          type: string
        503:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Failed to fetch exchange rate from exchangerate-api.com'
                properties:
                  message:
                    type: string
                    example: 'Failed to fetch exchange rate from exchangerate-api.com'
      tags:
        - 'Payment Requests'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount_local:
                  type: number
                  description: 'The amount in the specified currency. Must be greater than 0.'
                  example: 550.0
                currency_code:
                  type: string
                  description: 'ISO 4217 3-letter currency code.'
                  example: BRL
                description:
                  type: string
                  description: 'Optional note describing the payment.'
                  example: 'Office supplies'
                  nullable: true
              required:
                - amount_local
                - currency_code
  '/api/payment-requests/{paymentRequest_id}':
    get:
      summary: 'Get a payment request'
      operationId: getAPaymentRequest
      description: "Returns the details of a single payment request. Employees may only\nview their own requests; finance users may view any request."
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    id: 1
                    status: pending
                    amount_local: '550.00'
                    currency_code: BRL
                    amount_eur: '100.00'
                    exchange_rate: '5.500000'
                    rate_source: exchangerate-api.com
                    rate_fetched_at: '2026-06-12T12:00:00.000000Z'
                    description: 'Office supplies'
                    expires_at: '2026-06-14T12:00:00.000000Z'
                    created_at: '2026-06-12T12:00:00.000000Z'
                    user:
                      id: 1
                      name: 'Alice Ferreira'
                    reviewer: null
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      status:
                        type: string
                        example: pending
                      amount_local:
                        type: string
                        example: '550.00'
                      currency_code:
                        type: string
                        example: BRL
                      amount_eur:
                        type: string
                        example: '100.00'
                      exchange_rate:
                        type: string
                        example: '5.500000'
                      rate_source:
                        type: string
                        example: exchangerate-api.com
                      rate_fetched_at:
                        type: string
                        example: '2026-06-12T12:00:00.000000Z'
                      description:
                        type: string
                        example: 'Office supplies'
                      expires_at:
                        type: string
                        example: '2026-06-14T12:00:00.000000Z'
                      created_at:
                        type: string
                        example: '2026-06-12T12:00:00.000000Z'
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          name:
                            type: string
                            example: 'Alice Ferreira'
                      reviewer:
                        type: string
                        example: null
                        nullable: true
        403:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'This action is unauthorized.'
                properties:
                  message:
                    type: string
                    example: 'This action is unauthorized.'
        404:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'No query results for model [App\Models\PaymentRequest] 999'
                properties:
                  message:
                    type: string
                    example: 'No query results for model [App\Models\PaymentRequest] 999'
      tags:
        - 'Payment Requests'
    patch:
      summary: 'Approve or reject a payment request'
      operationId: approveOrRejectAPaymentRequest
      description: "Transitions a `pending` payment request to `approved` or `rejected`.\nOnly users with the `finance` role may perform this action, and only\nrequests currently `pending` can be transitioned. The exchange rate\nstored on the request is never re-fetched."
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
                    id: 1
                    status: approved
                    amount_local: '550.00'
                    currency_code: BRL
                    amount_eur: '100.00'
                    exchange_rate: '5.500000'
                    rate_source: exchangerate-api.com
                    rate_fetched_at: '2026-06-12T12:00:00.000000Z'
                    description: 'Office supplies'
                    expires_at: '2026-06-14T12:00:00.000000Z'
                    created_at: '2026-06-12T12:00:00.000000Z'
                    user:
                      id: 1
                      name: 'Alice Ferreira'
                    reviewer:
                      id: 7
                      name: 'Finance Admin'
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      status:
                        type: string
                        example: approved
                      amount_local:
                        type: string
                        example: '550.00'
                      currency_code:
                        type: string
                        example: BRL
                      amount_eur:
                        type: string
                        example: '100.00'
                      exchange_rate:
                        type: string
                        example: '5.500000'
                      rate_source:
                        type: string
                        example: exchangerate-api.com
                      rate_fetched_at:
                        type: string
                        example: '2026-06-12T12:00:00.000000Z'
                      description:
                        type: string
                        example: 'Office supplies'
                      expires_at:
                        type: string
                        example: '2026-06-14T12:00:00.000000Z'
                      created_at:
                        type: string
                        example: '2026-06-12T12:00:00.000000Z'
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          name:
                            type: string
                            example: 'Alice Ferreira'
                      reviewer:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 7
                          name:
                            type: string
                            example: 'Finance Admin'
        403:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'This action is unauthorized.'
                properties:
                  message:
                    type: string
                    example: 'This action is unauthorized.'
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Only pending requests can be approved.'
                properties:
                  message:
                    type: string
                    example: 'Only pending requests can be approved.'
      tags:
        - 'Payment Requests'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  description: 'The new status. Must be `approved` or `rejected`.'
                  example: approved
              required:
                - status
    parameters:
      -
        in: path
        name: paymentRequest_id
        description: 'The ID of the paymentRequest.'
        example: 1
        required: true
        schema:
          type: integer
      -
        in: path
        name: paymentRequest
        description: 'The ID of the payment request.'
        example: 1
        required: true
        schema:
          type: integer
